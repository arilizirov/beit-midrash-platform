# boundaries.yaml — LearnTorah (בית המדרש הדיגיטלי)
# ---------------------------------------------------------------------------
# Policy source of truth. Derived from docs/SPEC.md §2 (service modules),
# §4 (data model) and §3 (build order). Deny-by-default.
#
# STATUS: starting policy, written at kit setup BEFORE any app code exists.
# `doctor` stays red until each module's folder is stamped by
#   python bigbrainGenerator/new_domain.py <name>
# during its slice. Changing this file later is a deliberate PR with an ADR
# naming the present-day force — never a workaround for a failing check.
# ---------------------------------------------------------------------------

version: 1

# TS/JS app (Next.js App Router). Resolves to dependency-cruiser once
# package.json exists; no-ops before then.
adapter: auto

# Next.js `src/` directory: routes at src/app, domains at src/features/<name>.
source_root: src

# SPEC §8 is feature-oriented, not domain-oriented. The generator honors this.
layout: features

# LIVE MODULES ONLY. The boundary check over paths that match no files passes
# vacuously, so a module enters this block the moment its slice stamps real
# folders (the generator registers it) — never before.
#
# TARGET POLICY (the full map, activated slice by slice; keep in sync with
# docs/ARCHITECTURE.md):
#   platform  path: platform  public: [db, auth, storage, jobs, tenancy, telemetry]
#   ui        path: components/ui
#   identity      features/identity      Group, User, Membership, Invitation, can()/RBAC
#   taxonomy      features/taxonomy      Topic, Category, Tag (+ per-type tag joins)
#   discussions   features/discussions   Discussion, Contribution, Comment, Summary
#   content       features/content       Article, Note, TableBlock, Revision
#   sources       features/sources       Source, SourceCitation, SourceRefService
#   files         features/files         Attachment + presigned R2 flow
#   search        features/search        SearchService (leaf; domains push into it)
#   feed          features/feed          NewsPost (חדשות)
#   notifications features/notifications Notification, Follow, Reaction (leaf)
#   dashboard     features/dashboard     Widget, UserWidgetPref
#   editor        features/editor        the 4 TipTap nodes (SPEC §7)
#   allow (target): identity[platform,ui] · taxonomy[platform,ui,identity,search]
#     discussions[platform,ui,identity,taxonomy,search,notifications]
#     content[platform,ui,identity,taxonomy,search] · sources[platform,ui,identity,search]
#     files[platform,ui,identity] · search[platform] · feed[platform,ui,identity,search]
#     notifications[platform,ui,identity] · dashboard[platform,ui,identity]
#     editor[platform,ui,content,sources,files] · app[everything]
modules:
  # ---- composition root --------------------------------------------------
  app:
    path: app                       # Next.js App Router: routes, server actions
    public: [index]

# Boring, stable, imports nothing; implicitly importable by everyone.
# ids (cuid), Result/errors, Hebrew bidi + nikud helpers, shared enums.
shared_kernel:
  path: shared_kernel
  public: [index]

# DENY BY DEFAULT — list only what is allowed (live modules only; the target
# allow-map lives in the comment block above and activates with each slice).
# Shape: domains do not import each other sideways except where the spec forces
# it. Indexing and notifying are PUSH-based — a domain calls search/
# notifications, never the reverse — so search stays a leaf, not a hub.
allow:
  shared_kernel: []                 # imports nothing
  app: []                           # composition root; gains deps as slices land

# Deep-import ban: crossing into a module is allowed only through its `public`
# entries — never into its internal files. This is what keeps a boundary real.
enforce_public_surface: true

# (Python block removed — this is a TS/JS app; the Python adapters do not apply.)
